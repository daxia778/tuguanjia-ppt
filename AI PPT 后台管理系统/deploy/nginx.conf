# ============================================================
# AI PPT 统一入口 Nginx 配置
# 端口 81 同时承载管理面板和用户前台
# ============================================================
#
# 路由规则：
#   /admin/        → 管理面板静态文件 (admin-dist/)
#   /admin-api/    → 后端 Spring Boot (:48080)
#   /app-api/      → 后端 Spring Boot (:48080)
#   /              → 用户前台静态文件 (user-dist/)
#
# 部署步骤：
#   1. cd AI PPT 后台管理系统/frontend && npm run build    → dist-prod/
#   2. cd AI PPT 用户端 && npm run build                   → dist/
#   3. 将两个 dist 目录复制到服务器对应位置
#   4. nginx -t && nginx -s reload
# ============================================================

server {
    listen       81;
    server_name  localhost;  # ⚠️ 生产环境替换为实际域名

    charset utf-8;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ==================== API 代理 ====================

    # 管理端 API → 后端
    location /admin-api/ {
        proxy_pass http://127.0.0.1:48080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（用于实时通知）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 用户端 API → 后端（同一个 Spring Boot 实例）
    location /app-api/ {
        proxy_pass http://127.0.0.1:48080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== 管理面板 ====================

    # 管理面板静态文件（访问 http://domain:81/admin/）
    location /admin/ {
        alias /opt/ai-ppt/admin-dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ==================== 用户前台 ====================

    # 用户前台静态文件（访问 http://domain:81/）
    location / {
        root /opt/ai-ppt/user-dist/;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ==================== 其他 ====================

    # Druid 监控（仅内网访问）
    location /druid/ {
        proxy_pass http://127.0.0.1:48080;
        proxy_set_header Host $host;
        # allow 10.0.0.0/8;
        # deny all;
    }

    # 健康检查
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
