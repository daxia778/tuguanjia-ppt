<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LayerCraft - AI 智能图像分层</title>
  <meta name="description" content="AI 驱动的图像智能分层工具，一键将图像拆分为可编辑图层，导出 PSD" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/index.css" />
</head>
<body>
  <!-- ===== TOP BAR ===== -->
  <header id="topbar">
    <div class="topbar-left">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
          <rect x="2" y="6" width="20" height="20" rx="3" stroke="url(#g1)" stroke-width="2.2" fill="none" opacity="0.5"/>
          <rect x="7" y="3" width="20" height="20" rx="3" stroke="url(#g1)" stroke-width="2.2" fill="none" opacity="0.75"/>
          <rect x="10" y="8" width="20" height="20" rx="3" stroke="url(#g1)" stroke-width="2.2" fill="url(#g2)" opacity="0.15"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
            <linearGradient id="g2" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
          </defs>
        </svg>
        <span class="logo-text">LayerCraft</span>
      </div>
    </div>
    <div class="topbar-center">
      <div class="view-switcher" id="viewSwitcher">
        <button class="view-btn active" data-view="original" id="btnViewOriginal">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="6" r="2" fill="currentColor" opacity="0.5"/><path d="M1 11l4-4 3 3 2-2 5 5H2a1 1 0 01-1-1v-1z" fill="currentColor" opacity="0.3"/></svg>
          原图
        </button>
        <button class="view-btn" data-view="colormap" id="btnViewColormap">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" fill="#818cf8" opacity="0.7"/><rect x="9" y="1" width="6" height="6" rx="1" fill="#f472b6" opacity="0.7"/><rect x="1" y="9" width="6" height="6" rx="1" fill="#34d399" opacity="0.7"/><rect x="9" y="9" width="6" height="6" rx="1" fill="#fbbf24" opacity="0.7"/></svg>
          色块图
        </button>
        <button class="view-btn" data-view="layers" id="btnViewLayers">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1l7 4-7 4-7-4 7-4z" fill="currentColor" opacity="0.3"/><path d="M1 8l7 4 7-4" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6"/><path d="M1 11l7 4 7-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          分层预览
        </button>
      </div>
    </div>
    <div class="topbar-right">
      <div class="api-status" id="apiStatus">
        <span class="status-dot offline"></span>
        <span class="status-text">未配置 API</span>
      </div>
      <button class="icon-btn" id="btnSettings" title="设置">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 11.25a2.25 2.25 0 100-4.5 2.25 2.25 0 000 4.5z" stroke="currentColor" stroke-width="1.5"/><path d="M14.7 11.1a1.2 1.2 0 00.24 1.32l.04.04a1.45 1.45 0 11-2.06 2.06l-.04-.04a1.2 1.2 0 00-1.32-.24 1.2 1.2 0 00-.73 1.1v.12a1.45 1.45 0 11-2.9 0v-.06a1.2 1.2 0 00-.79-1.1 1.2 1.2 0 00-1.32.24l-.04.04a1.45 1.45 0 11-2.06-2.06l.04-.04a1.2 1.2 0 00.24-1.32 1.2 1.2 0 00-1.1-.73h-.12a1.45 1.45 0 110-2.9h.06a1.2 1.2 0 001.1-.79 1.2 1.2 0 00-.24-1.32l-.04-.04A1.45 1.45 0 115.42 3.3l.04.04a1.2 1.2 0 001.32.24h.06a1.2 1.2 0 00.73-1.1v-.12a1.45 1.45 0 012.9 0v.06a1.2 1.2 0 00.73 1.1 1.2 1.2 0 001.32-.24l.04-.04a1.45 1.45 0 112.06 2.06l-.04.04a1.2 1.2 0 00-.24 1.32v.06a1.2 1.2 0 001.1.73h.12a1.45 1.45 0 110 2.9h-.06a1.2 1.2 0 00-1.1.73z" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <main id="workspace">
    <!-- LEFT TOOLBAR -->
    <aside id="toolbar">
      <div class="tool-section">
        <label class="tool-section-title">工具</label>
        <button class="tool-btn active" id="toolMagicWand" title="魔棒选区 (W)">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10.5 2l1.1 3.4h3.6l-2.9 2.1 1.1 3.4-2.9-2.1-2.9 2.1 1.1-3.4L5.8 5.4h3.6L10.5 2z" stroke="currentColor" stroke-width="1.3" fill="currentColor" opacity="0.2"/><line x1="12" y1="12" x2="18" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>魔棒</span>
        </button>
        <button class="tool-btn" id="toolPan" title="平移 (H)">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2v16M2 10h16M10 2l-2 2m2-2l2 2M10 18l-2-2m2 2l2-2M2 10l2-2m-2 2l2 2M18 10l-2-2m2 2l-2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>平移</span>
        </button>
      </div>

      <div class="tool-section">
        <label class="tool-section-title">容差</label>
        <div class="tolerance-control">
          <input type="range" id="toleranceSlider" min="1" max="128" value="32" />
          <span class="tolerance-value" id="toleranceValue">32</span>
        </div>
      </div>

      <div class="tool-section">
        <label class="tool-section-title">AI 操作</label>
        <button class="action-btn primary" id="btnGenColormap" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor" opacity="0.4"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" opacity="0.6"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" opacity="0.6"/><rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" opacity="0.4"/></svg>
          生成色块图
        </button>
        <button class="action-btn" id="btnExtractBg" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M1 12l5-5 3 3 2-2 4 4" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
          提取背景
        </button>
        <button class="action-btn" id="btnAutoLayer" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1l7 4-7 4-7-4 7-4z" fill="currentColor" opacity="0.2"/><path d="M1 8l7 4 7-4" stroke="currentColor" stroke-width="1.3"/><path d="M1 11l7 4 7-4" stroke="currentColor" stroke-width="1.3"/></svg>
          自动分层
        </button>
      </div>

      <div class="tool-section">
        <label class="tool-section-title">操作</label>
        <button class="action-btn" id="btnUndo" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 7l-3 3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10h10a4 4 0 000-8H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          撤销
        </button>
        <button class="action-btn" id="btnRedo" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 7l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 10H5a4 4 0 010-8h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          重做
        </button>
      </div>
    </aside>

    <!-- CANVAS AREA -->
    <section id="canvasArea">
      <!-- Upload Zone (shown when no image) -->
      <div class="upload-zone" id="uploadZone">
        <div class="upload-content">
          <div class="upload-icon">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
              <rect x="4" y="12" width="56" height="44" rx="6" stroke="url(#ug1)" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
              <path d="M32 24v16M24 32h16" stroke="url(#ug1)" stroke-width="2.5" stroke-linecap="round"/>
              <defs><linearGradient id="ug1" x1="0" y1="0" x2="64" y2="64"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/></linearGradient></defs>
            </svg>
          </div>
          <h2 class="upload-title">拖放图片到此处</h2>
          <p class="upload-desc">或点击选择文件 · 支持 PNG / JPG / WebP</p>
          <button class="upload-btn" id="btnUpload">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 12V3M4 6l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            选择图片
          </button>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden />
        </div>
      </div>

      <!-- Canvas Container (shown when image loaded) -->
      <div class="canvas-container" id="canvasContainer" style="display:none">
        <canvas id="mainCanvas"></canvas>
        <canvas id="selectionCanvas"></canvas>
      </div>

      <!-- Zoom Controls -->
      <div class="zoom-controls" id="zoomControls" style="display:none">
        <button class="zoom-btn" id="btnZoomOut" title="缩小">−</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" id="btnZoomIn" title="放大">+</button>
        <button class="zoom-btn" id="btnZoomFit" title="适应画布">⊞</button>
      </div>
    </section>

    <!-- RIGHT PANEL -->
    <aside id="layerPanel">
      <div class="panel-header">
        <h3 class="panel-title">图层</h3>
        <span class="layer-count" id="layerCount">0 层</span>
      </div>

      <div class="layer-list" id="layerList">
        <div class="empty-layers">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M20 5l15 8-15 8L5 13l15-8z" fill="currentColor" opacity="0.1"/><path d="M5 20l15 8 15-8" stroke="currentColor" stroke-width="1.5" opacity="0.2"/><path d="M5 27l15 8 15-8" stroke="currentColor" stroke-width="1.5" opacity="0.15"/></svg>
          <p>暂无图层</p>
          <span>上传图片后使用魔棒工具<br/>从色块图中提取图层</span>
        </div>
      </div>

      <div class="panel-actions">
        <button class="export-btn" id="btnExportPSD" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2M8 2v9M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          导出 PSD
        </button>
        <button class="export-btn accent" id="btnExportPPT" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 6h8M4 9h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="12" cy="9" r="1.5" fill="currentColor" opacity="0.4"/></svg>
          导出 PPTX
        </button>
        <button class="export-btn secondary" id="btnExportPNG" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2M8 2v9M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          导出 PNG
        </button>
      </div>
    </aside>
  </main>

  <!-- ===== BOTTOM BAR ===== -->
  <footer id="bottombar">
    <div class="status-left">
      <span class="status-info" id="imageInfo">等待上传图片...</span>
    </div>
    <div class="status-center">
      <div class="progress-bar" id="progressBar" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
        <span class="progress-text" id="progressText">处理中...</span>
      </div>
    </div>
    <div class="status-right">
      <span class="status-hint">W 魔棒 · H 平移 · 滚轮缩放</span>
    </div>
  </footer>

  <!-- ===== SETTINGS MODAL ===== -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h3>API 设置</h3>
        <button class="modal-close" id="btnCloseSettings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="apiBaseUrl">API Base URL</label>
          <input type="text" id="apiBaseUrl" placeholder="/proxy-api" value="/proxy-api" />
          <span class="form-hint">支持 OpenAI 官方或任意兼容的反代地址</span>
        </div>
        <div class="form-group">
          <label for="apiKey">API Key</label>
          <div class="input-group">
            <input type="password" id="apiKey" placeholder="sk-..." />
            <button class="input-addon" id="btnToggleKey" title="显示/隐藏">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5S1 8 1 8z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="apiMode">API 模式</label>
          <select id="apiMode">
            <option value="chat" selected>Chat 模式 (ChatGPT 反代)</option>
            <option value="images">Images 模式 (OpenAI API 直连)</option>
          </select>
          <span class="form-hint">Chat 模式适用于 sub2api 等 ChatGPT 反代；Images 模式适用于官方 API Key</span>
        </div>
        <div class="form-group">
          <label for="modelSelect">模型</label>
          <select id="modelSelect">
            <option value="gpt-5.4" selected>GPT-5.4 (推荐)</option>
            <option value="gpt-5.4-mini">GPT-5.4 Mini</option>
            <option value="gpt-5.2">GPT-5.2</option>
            <option value="gpt-5">GPT-5</option>
            <option value="gpt-image-1">GPT Image 1 (仅 Images 模式)</option>
            <option value="gpt-image-2">GPT Image 2 (仅 Images 模式)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="imageSize">输出尺寸</label>
          <select id="imageSize">
            <option value="auto">自动</option>
            <option value="1024x1024">1024×1024</option>
            <option value="1024x1536">1024×1536 (竖版)</option>
            <option value="1536x1024">1536×1024 (横版)</option>
          </select>
        </div>
        <div class="form-row">
          <button class="action-btn primary full-width" id="btnTestApi">测试连接</button>
        </div>
        <div class="test-result" id="testResult"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn secondary" id="btnCancelSettings">取消</button>
        <button class="modal-btn primary" id="btnSaveSettings">保存设置</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST CONTAINER ===== -->
  <div id="toastContainer"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
